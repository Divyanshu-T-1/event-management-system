{% extends "base.html" %}

{% block title %}Edit Event{% endblock %}

{% block content %}
<h1 style="text-align:center;">Edit Event</h1>

<form method="post" style="max-width:500px; margin:20px auto;">
    {% csrf_token %}

    <div style="margin-bottom:15px;">
        <label>Title</label><br>
        <input type="text" name="title" value="{{ event.title }}"
               style="width:100%; padding:8px;">
    </div>

    <div style="margin-bottom:15px;">
        <label>Description</label><br>
        <textarea name="description" rows="4"
                  style="width:100%; padding:8px;">{{ event.description }}</textarea>
    </div>

    <div style="margin-bottom:15px;">
        <label>Date</label><br>
        <input type="date" name="date" value="{{ event.date|date:'Y-m-d' }}"
               style="width:100%; padding:8px;">
    </div>

    <div style="margin-bottom:15px;">
        <label>Location</label><br>
        <input type="text" name="location" value="{{ event.location }}"
               style="width:100%; padding:8px;">
    </div>

    <button type="submit" style="width:100%;">
        Update Event
    </button>
</form>
{% endblock %}
